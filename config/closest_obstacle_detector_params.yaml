closest_obstacle_detector:
  ros__parameters:
    # Input/Output Topics
    input_topic: "/scan"
    output_topic: "closest_obstacle"
    visualization_topic: "/obstacle_clusters"
    
    # Frame IDs
    laser_frame: "base_footprint"          # Frame do laser (pode ser base_link, laser, etc)
    world_frame: "map"               # Frame global (odom ou map)
    
    # DBSCAN Clustering Parameters
    eps: 0.3                          # Raio de vizinhança (metros)
    min_points: 3                     # Mínimo de pontos por cluster
    
    # Range Filtering
    max_range: 10.0                   # Alcance máximo do laser (metros)
    min_range: 0.1                    # Alcance mínimo (evita self-collision)
    
    # Visualization
    publish_markers: true             # Habilitar visualização de clusters