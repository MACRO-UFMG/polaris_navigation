amcl:
  ros__parameters:
    # =============================================
    # Modelo de Movimento (Skid Steering)
    # =============================================
    alpha1: 0.7    # Ruído translação X (derrapagem frontal/traseira)
    alpha2: 0.7    # Ruído translação Y (derrapagem lateral)
    alpha3: 0.4    # Ruído rotação
    alpha4: 0.5    # Ruído em curvas (skid steering)
    alpha5: 0.2    # Ruído não-linear

    # =============================================
    # Filtro de Partículas (High Uncertainty)
    # =============================================
    max_particles: 8000
    min_particles: 2000
    pf_err: 0.15   # Erro permitido maior
    pf_z: 0.90     # Confiança inicial baixa
    resample_interval: 2  # Reduzir sobrecarga

    # =============================================
    # Sensor Lidar (Priorize sobre odometria)
    # =============================================
    laser_model_type: "likelihood_field_prob"
    laser_likelihood_max_dist: 1.5  # Foco em features próximas
    max_beams: 30                   # Subamostragem para velocidade
    z_hit: 0.8       # Peso alto para hits reais
    z_rand: 0.05     # Ruído mínimo
    sigma_hit: 0.15  # Menor dispersão

    # =============================================
    # Tolerâncias e Recuperação
    # =============================================
    transform_tolerance: 2.0
    update_min_d: 0.3  # Atualizar após mover >30cm
    update_min_a: 0.5  # Atualizar após girar >0.5rad
    recovery_alpha_slow: 0.1
    recovery_alpha_fast: 0.5

    # =============================================
    # Frames (Verifique no seu robô!)
    # =============================================
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"

controller_server:
  ros__parameters:
    # =============================================
    # Configuração do Skid Steering
    # =============================================
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      motion_model: "SkidSteer"       # Ou "SkidSteer" se suportado
      vx_max: 0.3               # Velocidade máxima X
      vy_max: 0.0               # Skid puro não tem movimento lateral
      wz_max: 1.0               # Rotação reduzida
      ax_max: 0.8               # Aceleração conservadora
      ay_max: 0.0
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic"]

    # =============================================
    # Tolerâncias de Navegação
    # =============================================
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.7     # Tolerância alta
      yaw_goal_tolerance: 0.8
      stateful: True

local_costmap:
  local_costmap:
    ros__parameters:
      # =============================================
      # Costmap Adaptado (Odometria Ruim)
      # =============================================
      update_frequency: 1.0       # Atualização lenta
      publish_frequency: 1.0
      width: 4.0                 # Área maior
      height: 4.0
      resolution: 0.05
      inflation_radius: 1.2       # Margem de segurança
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        obstacle_max_range: 2.0   # Ignorar obstáculos distantes

global_costmap:
  global_costmap:
    ros__parameters:
      inflation_radius: 1.0
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      allow_unknown: True        # Crucial para odometria ruim
      tolerance: 1.0

velocity_smoother:
  ros__parameters:
    max_velocity: [0.3, 0.0, 1.0]  # Skid steering: vy = 0
    max_accel: [0.8, 0.0, 1.2]